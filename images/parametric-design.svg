<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Parametric grid lines -->
  <g stroke="#FF6B35" stroke-width="0.5" opacity="0.15">
    <path d="M0,100 Q300,80 600,120 Q900,160 1200,100"/>
    <path d="M0,150 Q300,130 600,170 Q900,210 1200,150"/>
    <path d="M0,200 Q300,180 600,220 Q900,260 1200,200"/>
    <path d="M0,250 Q300,230 600,270 Q900,310 1200,250"/>
    <path d="M0,300 Q300,280 600,320 Q900,360 1200,300"/>
    <path d="M0,350 Q300,330 600,370 Q900,410 1200,350"/>
    <path d="M0,400 Q300,380 600,420 Q900,460 1200,400"/>
  </g>
  <!-- Vertical parametric lines -->
  <g stroke="#4488ff" stroke-width="0.5" opacity="0.12">
    <path d="M100,0 Q120,315 100,630"/>
    <path d="M250,0 Q270,315 250,630"/>
    <path d="M400,0 Q380,315 400,630"/>
    <path d="M550,0 Q570,315 550,630"/>
    <path d="M700,0 Q680,315 700,630"/>
    <path d="M850,0 Q870,315 850,630"/>
    <path d="M1000,0 Q980,315 1000,630"/>
    <path d="M1100,0 Q1120,315 1100,630"/>
  </g>
  <!-- Parametric house form - wireframe -->
  <g transform="translate(600, 280)" fill="none" stroke-width="1.5">
    <!-- Main volume -->
    <path d="M-200,80 L-200,-40 Q-180,-100 -100,-120 Q0,-140 100,-120 Q180,-100 200,-40 L200,80" stroke="#FF6B35" opacity="0.9"/>
    <!-- Roof curve -->
    <path d="M-220,-40 Q-180,-120 -100,-140 Q0,-165 100,-140 Q180,-120 220,-40" stroke="#FF6B35" opacity="0.7" stroke-dasharray="4,3"/>
    <!-- Interior structure lines -->
    <path d="M-150,80 L-150,-30 Q-120,-80 -60,-95" stroke="#4488ff" opacity="0.5"/>
    <path d="M-50,80 L-50,-50 Q-20,-110 40,-115" stroke="#4488ff" opacity="0.5"/>
    <path d="M50,80 L50,-50 Q80,-110 140,-95" stroke="#4488ff" opacity="0.5"/>
    <path d="M150,80 L150,-30" stroke="#4488ff" opacity="0.5"/>
    <!-- Cross-curves -->
    <path d="M-200,20 Q0,-10 200,20" stroke="#fff" opacity="0.2"/>
    <path d="M-200,-10 Q0,-40 200,-10" stroke="#fff" opacity="0.15"/>
    <!-- Window openings -->
    <ellipse cx="-120" cy="10" rx="25" ry="35" stroke="#4488ff" opacity="0.6" stroke-dasharray="3,2"/>
    <ellipse cx="0" cy="-10" rx="30" ry="40" stroke="#4488ff" opacity="0.6" stroke-dasharray="3,2"/>
    <ellipse cx="120" cy="10" rx="25" ry="35" stroke="#4488ff" opacity="0.6" stroke-dasharray="3,2"/>
    <!-- Ground line -->
    <line x1="-240" y1="80" x2="240" y2="80" stroke="#555" stroke-width="1"/>
    <!-- Control points -->
    <circle cx="-200" cy="-40" r="4" fill="#FF6B35" opacity="0.9"/>
    <circle cx="-100" cy="-120" r="4" fill="#FF6B35" opacity="0.9"/>
    <circle cx="0" cy="-140" r="5" fill="#FF6B35" opacity="0.9"/>
    <circle cx="100" cy="-120" r="4" fill="#FF6B35" opacity="0.9"/>
    <circle cx="200" cy="-40" r="4" fill="#FF6B35" opacity="0.9"/>
    <!-- Glow on apex -->
    <circle cx="0" cy="-140" r="20" fill="url(#glow)" filter="url(#blur2)" opacity="0.6"/>
    <!-- Parameter labels -->
    <text x="-100" y="-130" fill="#FF6B35" font-family="monospace" font-size="9" opacity="0.6">P₂(-100,-120)</text>
    <text x="10" y="-150" fill="#FF6B35" font-family="monospace" font-size="9" opacity="0.6">P₃(0,-140)</text>
    <text x="110" y="-130" fill="#FF6B35" font-family="monospace" font-size="9" opacity="0.6">P₄(100,-120)</text>
    <!-- Dimension arrows -->
    <line x1="-200" y1="100" x2="200" y2="100" stroke="#888" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="-10" y="115" fill="#888" font-family="monospace" font-size="10">12.4m</text>
  </g>
  <!-- UI elements - slider controls on right -->
  <g transform="translate(950, 150)">
    <rect x="0" y="0" width="180" height="220" rx="8" fill="#1a1a2a" stroke="#333" stroke-width="1" opacity="0.9"/>
    <text x="15" y="25" fill="#ccc" font-family="Inter, sans-serif" font-size="11" font-weight="600">PARAMETERS</text>
    <line x1="15" y1="35" x2="165" y2="35" stroke="#333"/>
    <!-- Sliders -->
    <text x="15" y="55" fill="#888" font-family="monospace" font-size="9">roof_curvature</text>
    <rect x="15" y="60" width="150" height="4" rx="2" fill="#333"/>
    <rect x="15" y="60" width="95" height="4" rx="2" fill="#FF6B35"/>
    <circle cx="110" cy="62" r="6" fill="#FF6B35"/>
    <text x="15" y="90" fill="#888" font-family="monospace" font-size="9">wall_taper</text>
    <rect x="15" y="95" width="150" height="4" rx="2" fill="#333"/>
    <rect x="15" y="95" width="60" height="4" rx="2" fill="#4488ff"/>
    <circle cx="75" cy="97" r="6" fill="#4488ff"/>
    <text x="15" y="125" fill="#888" font-family="monospace" font-size="9">window_count</text>
    <rect x="15" y="130" width="150" height="4" rx="2" fill="#333"/>
    <rect x="15" y="130" width="75" height="4" rx="2" fill="#4488ff"/>
    <circle cx="90" cy="132" r="6" fill="#4488ff"/>
    <text x="15" y="160" fill="#888" font-family="monospace" font-size="9">floor_area_m²</text>
    <rect x="15" y="165" width="150" height="4" rx="2" fill="#333"/>
    <rect x="15" y="165" width="120" height="4" rx="2" fill="#FF6B35"/>
    <circle cx="135" cy="167" r="6" fill="#FF6B35"/>
    <text x="15" y="195" fill="#888" font-family="monospace" font-size="9">orientation_deg</text>
    <rect x="15" y="200" width="150" height="4" rx="2" fill="#333"/>
    <rect x="15" y="200" width="45" height="4" rx="2" fill="#4488ff"/>
    <circle cx="60" cy="202" r="6" fill="#4488ff"/>
  </g>
  <!-- Bottom overlay -->
  <rect y="480" width="1200" height="150" fill="rgba(0,0,0,0.65)"/>
  <text x="40" y="535" fill="#fff" font-family="Georgia, serif" font-size="30" font-weight="bold">Every Wall Is a Variable</text>
  <text x="40" y="568" fill="#FF6B35" font-family="Arial, sans-serif" font-size="17">Parametric Design Turns Custom Homes into Equations — and AI Solves Them in Seconds</text>
  <text x="40" y="598" fill="#999" font-family="Arial, sans-serif" font-size="13">AI Home Building · Elena Vasquez</text>
</svg>
