  <circle cx="3.5" cy="22" r="1.2" fill="#fff" opacity="0.5"/>
  <line x1="4.7" y1="22" x2="7" y2="22" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
  <circle cx="28.5" cy="22" r="1.2" fill="#fff" opacity="0.5"/>
