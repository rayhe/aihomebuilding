<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- House silhouette with circuit/AI nodes -->
  <g transform="translate(0,4)">
    <!-- House body -->
    <rect x="6" y="20" width="28" height="20" rx="2" fill="#FF6B35"/>
    <!-- Roof -->
    <path d="M2 22 L20 6 L38 22" stroke="#FF6B35" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Door -->
    <rect x="16" y="28" width="8" height="12" rx="1" fill="#fff" opacity="0.9"/>
    <!-- Window left -->
    <rect x="9" y="24" width="5" height="5" rx="0.5" fill="#fff" opacity="0.7"/>
    <!-- Window right -->
    <rect x="26" y="24" width="5" height="5" rx="0.5" fill="#fff" opacity="0.7"/>
    <!-- Circuit lines emanating from house -->
    <line x1="38" y1="25" x2="50" y2="25" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
    <line x1="38" y1="32" x2="48" y2="32" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>
    <line x1="30" y1="6" x2="30" y2="0" stroke="#FF6B35" stroke-width="1.5" opacity="0.3"/>
    <!-- AI nodes (small circles at circuit endpoints) -->
    <circle cx="50" cy="25" r="2" fill="#FF6B35" opacity="0.6"/>
    <circle cx="48" cy="32" r="1.5" fill="#FF6B35" opacity="0.5"/>
    <circle cx="30" cy="0" r="1.5" fill="#FF6B35" opacity="0.4"/>
  </g>
  <!-- Text -->
  <text x="58" y="26" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="22" fill="#1a1a1a" letter-spacing="-0.5">
    AI Home <tspan fill="#FF6B35">Building</tspan>
  </text>
  <text x="58" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="9" fill="#888" letter-spacing="0.5">
    RESEARCH &amp; REPORTING
  </text>
</svg>
