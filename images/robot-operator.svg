<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#e8b86d"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#6B5B45"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#0088ff"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- Ground -->
  <rect y="380" width="1200" height="250" fill="url(#ground)"/>
  <!-- Dust particles -->
  <circle cx="200" cy="360" r="2" fill="#d4a" opacity="0.3"/>
  <circle cx="500" cy="340" r="3" fill="#d4a" opacity="0.25"/>
  <circle cx="800" cy="370" r="2" fill="#d4a" opacity="0.2"/>
  <circle cx="350" cy="350" r="1.5" fill="#d4a" opacity="0.35"/>
  <!-- Excavator in background -->
  <g transform="translate(750, 250)">
    <!-- Tracks -->
    <rect x="0" y="100" width="180" height="40" rx="20" fill="#333"/>
    <rect x="10" y="105" width="160" height="30" rx="15" fill="#444"/>
    <!-- Body -->
    <rect x="20" y="50" width="140" height="55" rx="8" fill="#e8a832"/>
    <rect x="25" y="55" width="45" height="25" rx="3" fill="#333" opacity="0.6"/>
    <!-- Boom -->
    <line x1="60" y1="55" x2="-40" y2="-60" stroke="#e8a832" stroke-width="18" stroke-linecap="round"/>
    <line x1="-40" y1="-60" x2="-100" y2="30" stroke="#e8a832" stroke-width="14" stroke-linecap="round"/>
    <!-- Bucket -->
    <path d="-110,30 -130,50 -90,55 -80,35" fill="#555"/>
    <!-- AI indicator -->
    <circle cx="140" cy="65" r="8" fill="#00ff88" opacity="0.8"/>
    <circle cx="140" cy="65" r="12" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
    <text x="140" y="69" text-anchor="middle" fill="#000" font-size="9" font-weight="bold">AI</text>
  </g>
  <!-- Control station -->
  <g transform="translate(250, 300)">
    <!-- Desk -->
    <rect x="0" y="40" width="200" height="8" rx="2" fill="#555"/>
    <!-- Legs -->
    <rect x="10" y="48" width="6" height="50" fill="#444"/>
    <rect x="184" y="48" width="6" height="50" fill="#444"/>
    <!-- Monitors -->
    <rect x="10" y="-30" width="80" height="65" rx="4" fill="#222"/>
    <rect x="15" y="-25" width="70" height="50" rx="2" fill="url(#screen)" opacity="0.8"/>
    <rect x="100" y="-20" width="70" height="55" rx="4" fill="#222"/>
    <rect x="105" y="-15" width="60" height="40" rx="2" fill="#0066cc" opacity="0.7"/>
    <!-- Screen content lines -->
    <line x1="20" y1="-15" x2="75" y2="-15" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="-8" x2="60" y2="-8" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="-1" x2="70" y2="-1" stroke="#fff" stroke-width="1" opacity="0.4"/>
    <rect x="110" y="-8" width="50" height="25" rx="2" fill="#003366" opacity="0.5"/>
  </g>
  <!-- Worker/operator -->
  <g transform="translate(330, 240)">
    <!-- Body -->
    <rect x="-15" y="20" width="40" height="50" rx="5" fill="#ff6b35"/>
    <!-- Safety vest stripes -->
    <line x1="-10" y1="30" x2="20" y2="30" stroke="#ffff00" stroke-width="3" opacity="0.8"/>
    <line x1="-10" y1="45" x2="20" y2="45" stroke="#ffff00" stroke-width="3" opacity="0.8"/>
    <!-- Head -->
    <circle cx="5" cy="8" r="14" fill="#c68642"/>
    <!-- Hard hat -->
    <ellipse cx="5" cy="-2" rx="18" ry="10" fill="#ffcc00"/>
    <rect x="-13" y="-2" width="36" height="5" rx="2" fill="#e6b800"/>
    <!-- Arms reaching to controls -->
    <line x1="-10" y1="30" x2="-25" y2="55" stroke="#c68642" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="35" y2="55" stroke="#c68642" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- Signal waves from station to excavator -->
  <g opacity="0.4">
    <path d="M460,310 Q600,250 740,290" fill="none" stroke="#00ff88" stroke-width="2" stroke-dasharray="8,4"/>
    <path d="M460,300 Q600,240 740,280" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="6,4"/>
    <path d="M460,320 Q600,260 740,300" fill="none" stroke="#00ff88" stroke-width="1" stroke-dasharray="4,4"/>
  </g>
  <!-- Title overlay -->
  <rect y="480" width="1200" height="150" fill="rgba(0,0,0,0.6)"/>
  <text x="40" y="540" fill="#fff" font-family="Georgia, serif" font-size="32" font-weight="bold">The New Construction Worker</text>
  <text x="40" y="575" fill="#e8a832" font-family="Arial, sans-serif" font-size="18">From Hardhat to Headset: Robot Operators Are the Highest-Paid Workers on the Job Site</text>
  <text x="40" y="605" fill="#aaa" font-family="Arial, sans-serif" font-size="14">AI Home Building · Marcus "Steel" Washington</text>
</svg>
