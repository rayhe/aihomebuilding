<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2d4a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0066cc" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="glow-f"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- House outline -->
  <g stroke="#334466" stroke-width="2" fill="none" opacity="0.5">
    <rect x="200" y="250" width="800" height="350" rx="4"/>
    <polygon points="200,250 600,80 1000,250"/>
    <!-- Floors -->
    <line x1="200" y1="420" x2="1000" y2="420"/>
    <!-- Walls -->
    <line x1="500" y1="250" x2="500" y2="600"/>
    <line x1="750" y1="420" x2="750" y2="600"/>
  </g>
  <!-- HVAC system -->
  <g filter="url(#glow-f)">
    <rect x="280" y="280" width="80" height="60" rx="6" fill="#1a3355" stroke="#00aaff" stroke-width="1.5"/>
    <text x="320" y="315" text-anchor="middle" fill="#00ccff" font-family="monospace" font-size="11">HVAC</text>
    <!-- Duct lines -->
    <path d="M360,310 Q420,310 420,280 Q420,260 500,260" stroke="#00aaff" stroke-width="1" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
    <path d="M360,310 Q450,310 450,350 Q450,380 550,380" stroke="#00aaff" stroke-width="1" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
  </g>
  <!-- Water heater -->
  <g filter="url(#glow-f)">
    <rect x="560" y="450" width="60" height="80" rx="8" fill="#1a3355" stroke="#00cc88" stroke-width="1.5"/>
    <text x="590" y="495" text-anchor="middle" fill="#00cc88" font-family="monospace" font-size="10">H₂O</text>
    <!-- Pipes -->
    <path d="M590,450 L590,420" stroke="#00cc88" stroke-width="1.5" fill="none"/>
    <path d="M590,420 Q590,390 650,390 Q750,390 750,420" stroke="#00cc88" stroke-width="1" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
  </g>
  <!-- Electrical panel -->
  <g filter="url(#glow-f)">
    <rect x="830" y="280" width="70" height="90" rx="4" fill="#1a3355" stroke="#ffaa00" stroke-width="1.5"/>
    <text x="865" y="320" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="10">PANEL</text>
    <line x1="845" y1="335" x2="885" y2="335" stroke="#ffaa00" stroke-width="0.8" opacity="0.6"/>
    <line x1="845" y1="345" x2="885" y2="345" stroke="#ffaa00" stroke-width="0.8" opacity="0.6"/>
    <line x1="845" y1="355" x2="885" y2="355" stroke="#ffaa00" stroke-width="0.8" opacity="0.6"/>
  </g>
  <!-- AI Sensor nodes (pulsing circles) -->
  <g>
    <circle cx="320" cy="310" r="12" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="320" cy="310" r="4" fill="#00d4ff"/>
    <circle cx="590" cy="490" r="12" fill="none" stroke="#00cc88" stroke-width="1.5" opacity="0.8"/>
    <circle cx="590" cy="490" r="4" fill="#00cc88"/>
    <circle cx="865" cy="325" r="12" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.8"/>
    <circle cx="865" cy="325" r="4" fill="#ffaa00"/>
    <!-- Leak sensor -->
    <circle cx="750" cy="500" r="10" fill="none" stroke="#ff4466" stroke-width="1.5" opacity="0.8"/>
    <circle cx="750" cy="500" r="3" fill="#ff4466"/>
  </g>
  <!-- Data stream lines to central hub -->
  <g stroke-width="1" fill="none" opacity="0.4">
    <path d="M332,310 Q450,200 600,180" stroke="#00d4ff" stroke-dasharray="3,6"/>
    <path d="M602,490 Q600,350 600,180" stroke="#00cc88" stroke-dasharray="3,6"/>
    <path d="M853,325 Q750,200 600,180" stroke="#ffaa00" stroke-dasharray="3,6"/>
    <path d="M750,488 Q680,350 600,180" stroke="#ff4466" stroke-dasharray="3,6"/>
  </g>
  <!-- Central AI hub -->
  <g filter="url(#glow-f)">
    <circle cx="600" cy="170" r="30" fill="#0a1628" stroke="#00d4ff" stroke-width="2"/>
    <text x="600" y="165" text-anchor="middle" fill="#00d4ff" font-family="sans-serif" font-weight="bold" font-size="14">AI</text>
    <text x="600" y="182" text-anchor="middle" fill="#88bbdd" font-family="monospace" font-size="9">HUB</text>
  </g>
  <!-- Diagnostic readout boxes -->
  <g font-family="monospace" font-size="9">
    <rect x="220" y="360" width="120" height="40" rx="4" fill="#0d1f35" stroke="#00aaff" stroke-width="0.8" opacity="0.8"/>
    <text x="230" y="377" fill="#00ccff">EFFICIENCY: 94.2%</text>
    <text x="230" y="390" fill="#44aa66">▲ FILTER: 18d left</text>

    <rect x="790" y="390" width="130" height="40" rx="4" fill="#0d1f35" stroke="#ffaa00" stroke-width="0.8" opacity="0.8"/>
    <text x="800" y="407" fill="#ffaa00">LOAD: 42% / 200A</text>
    <text x="800" y="420" fill="#44aa66">✓ ALL CIRCUITS OK</text>

    <rect x="650" y="540" width="130" height="40" rx="4" fill="#0d1f35" stroke="#ff4466" stroke-width="0.8" opacity="0.8"/>
    <text x="660" y="557" fill="#ff4466">⚠ MOISTURE: +12%</text>
    <text x="660" y="570" fill="#ffaa44">INSPECT WITHIN 7d</text>
  </g>
  <!-- Title area glow -->
  <rect x="0" y="0" width="1200" height="675" fill="url(#glow)" opacity="0.08"/>
</svg>
